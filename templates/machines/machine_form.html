{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div style="max-width: 800px; margin: 0 auto;">
    <a href="{% url 'machines:machine_list' %}" class="btn" style="background: #888; margin-bottom: 15px;">← Назад к списку</a>
    <h2 style="color: var(--primary); margin-bottom: 20px;">{{ title }}</h2>
    
    <form method="post" style="background: var(--white); padding: 25px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);">
        {% csrf_token %}
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            {% for field in form %}
                <div style="margin-bottom: 10px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 500;">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div style="color: var(--accent); font-size: 0.85rem; margin-top: 4px;">{{ field.errors|striptags }}</div>
                    {% endif %}
                </div>
            {% endfor %}
        </div>
        <button type="submit" class="btn" style="margin-top: 20px; width: 100%;">💾 Сохранить машину</button>
    </form>
</div>
{% endblock %}
