<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Мой Силант{% endblock %}</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
    <link rel="stylesheet" href="{% static 'css/header.css' %}" />
    <link rel="stylesheet" href="{% static 'css/main.css' %}" />
    <link rel="stylesheet" href="{% static 'css/footer.css' %}" />

    {% block extra_css %}{% endblock %}
  </head>
  <body>
    <header>
      <div class="header__inner">
        <!-- 🔹 Здесь будет логотип, навигация, контакты, авторизация -->
        {% block header %}{% endblock %}
      </div>
    </header>

    <main class="container">
      {% if messages %}
      <div class="messages">
        {% for message in messages %}
        <div class="message {{ message.tags }}">{{ message }}</div>
        {% endfor %}
      </div>
      {% endif %} {% block content %}{% endblock %}
    </main>

    <footer>
      <div class="container">{% block footer %}{% endblock %}</div>
    </footer>

    <div id="reference-modal" class="modal" role="dialog" aria-modal="true">
      <div class="modal-content">
        <button
          type="button"
          class="modal-close"
          id="modal-close-btn"
          aria-label="Закрыть"
        >
          &times;
        </button>
        <div id="modal-body"></div>
      </div>
    </div>

    <script
      src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"
      defer
    ></script>
    <script src="{% static 'js/main.js' %}" defer></script>
    {% block extra_js %}{% endblock %}
  </body>
</html>
